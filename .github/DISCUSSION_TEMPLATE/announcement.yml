name: 📆 백엔드 작업 현황 공유
description: 백엔드 팀장이 팀원 전체(종준, 강현, 태연, 종호)의 데일리 작업을 한 번에 취합하여 공유합니다.
title: "[Daily] YYYY-MM-DD 백엔드 파트 작업 현황"
labels: ["daily", "backend"]
body:
  - type: markdown
    attributes:
      value: |
        ## ☕ 백엔드 데일리 스탠드업
        오늘 하루 백엔드 파트의 전체적인 작업 목표와 진행 상황을 공유합니다.

  - type: textarea
    id: today_tasks
    attributes:
      label: 🎯 맴버별 오늘 할 일 (To-Do)
      description: 팀원 각자의 연관 이슈 번호와 주요 작업 내역(P0~P2)을 작성해 주세요.
      value: |
        ### 👨‍💻 종준
        - [ ] 
        - [ ] 

        ### 👨‍💻 강현
        - [ ] 
        - [ ] 

        ### 👩‍💻 태연
        - [ ] 
        - [ ] 

        ### 👨‍💻 종호
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: done_summary
    attributes:
      label: ✅ 전날 주요 완료 항목 (Done)
      description: 전날 마무리된 핵심 이슈나 머지된 PR을 간략히 요약해 주세요. (선택)
      placeholder: |
        예) 
        - 강현: #12 로그인 API 예외 처리 완료 및 머지
        - 태연: #15 Course 엔티티 설계 논의 완료
    validations:
      required: false

  - type: textarea
    id: blockers
    attributes:
      label: 🚨 특이사항 및 블로커 (Blocker & Issues)
      description: 파트 내에서 논의가 필요하거나, 프론트엔드 등 타 파트와 협의해야 할 이슈를 적어주세요.
      placeholder: 예) 종준, 강현: 오후 2시에 비디오 진행률 저장 관련해서 API 스펙 논의 예정입니다.
    validations:
      required: false

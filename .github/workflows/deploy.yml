name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 프로젝트 빌드
        run: |
          chmod +x gradlew
          ./gradlew build -x test --no-daemon
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          INFLUX_TOKEN: ${{ secrets.INFLUX_TOKEN }}

      - name: JAR + Dockerfile EC2로 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar,Dockerfile"
          target: "/home/ec2-user/app"

      - name: EC2에서 Docker 이미지 빌드 및 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app

            docker stop hard-click || true
            docker rm hard-click || true

            docker build -t hard-click .

            docker run -d \
              --name hard-click \
              -p 8080:8080 \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }} \
              -e INFLUX_TOKEN=${{ secrets.INFLUX_TOKEN }} \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              hard-click

# chap02-spring-test 테스트 환경 설정
#
# 이 파일은 테스트 실행 시에만 사용되는 설정을 정의한다.
# 메인 설정보다 높은 우선순위를 가지며, 테스트에 최적화된 설정을 제공한다.

# 테스트용 서버 설정
server:
  port: 0  # 랜덤 포트 사용으로 포트 충돌 방지

# Spring 테스트 설정
spring:
  # 애플리케이션 정보
  application:
    name: chap01-spring-test-env

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: test
    password: test

  # H2 콘솔 설정 (테스트 디버깅용)
  h2:
    console:
      enabled: true
      path: /h2-console

  # 테스트용 JPA 설정 (Section 03에서만 사용)
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true  # 테스트에서는 SQL 로그 활성화

  # 테스트용 SQL 초기화 설정
  sql:
    init:
      mode: never

# 테스트용 로깅 설정
logging:
  # 테스트 환경에서는 파일에 로그를 남기지 않고 콘솔에만 찍도록 test 프로필 적용
  config: classpath:logback-spring.xml
  level:
    com.wanted.springtest: DEBUG  # 테스트 대상 패키지는 DEBUG 레벨
    org.springframework.test: INFO     # Spring 테스트 프레임워크 로그
    org.springframework.web: DEBUG     # 웹 계층 디버깅 (Section 01용)
    org.hibernate.SQL: DEBUG          # SQL 쿼리 로그 (Section 03용)
    org.junit: INFO                    # JUnit 프레임워크 로그



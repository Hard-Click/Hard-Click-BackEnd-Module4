community:
  image:
    post-dir: C:/lecture/Hard-Click-B/Hard-Click-BackEnd/src/main/resources/static/community/post/
    comment-dir: C:/lecture/Hard-Click-B/Hard-Click-BackEnd/src/main/resources/static/community/comment/
    post-url: /uploads/community/post/
    comment-url: /uploads/community/comment/
    max-size: 5242880

identity:
  profile-image:
    upload-dir: src/main/resources/static/identity/profile/
    url: http://localhost:8080/identity/profile/
    max-size: 5242880

email:
  allowed-domain: gmail.com

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:1209600000}

spring:
  application:
    name: Hard-Click-BackEnd

  profiles:
    active: dev
    include: secret

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/Hard-Click}
    username: ${DB_USERNAME:Hard-Click}
    password: ${DB_PASSWORD:Hard-Click}

  jpa:
    database: mysql
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:13579lty0907@gmail.com}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:hard_click_redis_2026}

influx:
  url: ${INFLUX_URL:http://localhost:8086}
  token: ${INFLUX_TOKEN}
  org: ${INFLUX_ORG:hardclick}
  bucket: ${INFLUX_BUCKET:hardclick-metrics}
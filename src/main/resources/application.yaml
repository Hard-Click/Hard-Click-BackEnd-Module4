spring:
  application:
    name: hard-click

  Jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/Hard-Click}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}



    hikari:
      maximum-pool-size: 10
      minimum-idle: 10
      pool-name: HikariPool-1

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false


  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  config:
    import: optional:classpath:application-secret.yaml

  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:1800000}
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:1209600000}

aws:
  s3:
    bucket: ${S3_BUCKET}
    region: ${AWS_REGION:ap-northeast-2}
    presign:
      access-key: ${S3_PRESIGN_ACCESS_KEY:}
      secret-key: ${S3_PRESIGN_SECRET_KEY:}
    presigned-url:
      video-minutes: ${S3_VIDEO_PRESIGNED_URL_MINUTES:10}

toss:
  payments:
    base-url: ${TOSS_API_BASE_URL:https://api.tosspayments.com}
    secret-key: ${TOSS_SECRET_KEY}

server:
  port: 8080
  tomcat:
    threads:
      max: 400
      min-spare: 50
    accept-count: 500
    max-connections: 10000
    max-swallow-size: -1

identity:
  redis:
    mutation-retry-attempts: ${IDENTITY_REDIS_MUTATION_RETRY_ATTEMPTS:3}

  email:
    allowed-domain: gmail.com
    code-ttl: ${IDENTITY_EMAIL_CODE_TTL:300000}
    verified-token-ttl: ${IDENTITY_EMAIL_VERIFIED_TOKEN_TTL:300000}
    processing-reservation-ttl: ${IDENTITY_EMAIL_PROCESSING_RESERVATION_TTL:300000}
    completion-retry-attempts: ${IDENTITY_EMAIL_COMPLETION_RETRY_ATTEMPTS:3}
    password-reset-daily-limit: ${IDENTITY_EMAIL_PASSWORD_RESET_DAILY_LIMIT:3}

  profile-image:
    upload-dir: uploads/profiles
    url: /uploads/profiles
    max-size: 5242880

community:
  image:
    post-dir: uploads/posts
    post-url: /uploads/posts
    comment-dir: uploads/comments
    comment-url: /uploads/comments
    max-size: 5242880

subscription:
  # 연간 패스 가격 = (다가오는 수능까지 남은 일수) × daily-rate
  # 수능 날짜는 매년 갱신 필요(미갱신 시 다음 해 같은 날짜로 자동 롤오버).
  suneung-date: ${SUBSCRIPTION_SUNEUNG_DATE:2026-11-19}
  daily-rate: ${SUBSCRIPTION_DAILY_RATE:30000}

grass:
  lesson:
    max-level: ${GRASS_LESSON_MAX_LEVEL:4}
  study-time:
    level-threshold-seconds: ${GRASS_STUDY_TIME_LEVEL_THRESHOLD_SECONDS:1,1800,3600,7200}
  streak:
    query-page-size: ${GRASS_STREAK_QUERY_PAGE_SIZE:100}

study-timer:
  member-lock:
    timeout-milliseconds: 3000

ranking:
  redis:
    key-prefix: ${RANKING_REDIS_KEY_PREFIX:${spring.profiles.active:local}:ranking}
    default-limit: ${RANKING_REDIS_DEFAULT_LIMIT:10}

logging:
  config: classpath:logback-spring.xml
  level:
    com.wanted.backend: INFO
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
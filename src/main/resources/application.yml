spring:
  profiles:
    include: secret
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

server:
  port: 8080
  tomcat:
    max-swallow-size: 10485760

aws:
  s3:
    bucket: ${S3_BUCKET}
    region: ${S3_REGION:ap-northeast-2}
    presigned-url-expiry-minutes: 60

community:
  image:
    max-size: 5242880

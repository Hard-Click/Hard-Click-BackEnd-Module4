services:
  redis:
    image: redis:7
    container_name: hardclick-redis
    command: redis-server --requirepass hard_click_redis_2026
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  influxdb:
    image: influxdb:2
    container_name: hardclick-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: hardclick
      DOCKER_INFLUXDB_INIT_PASSWORD: hardclick2026
      DOCKER_INFLUXDB_INIT_ORG: hardclick
      DOCKER_INFLUXDB_INIT_BUCKET: hardclick-metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: pigZgYU_u7jQRvM9c9s3z2aL_sE9d05sVeFsqQdlp_JBBbUed5XuO8rMxd5pnoAXrwooiSzl2HL6jfjln0qGDA==
    volumes:
      - influxdb-data:/var/lib/influxdb2

volumes:
  redis-data:
  influxdb-data: